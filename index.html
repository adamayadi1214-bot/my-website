! DOCTYPE html >
<html lang="en" >
<head >
<meta charset="UTF-8" >
<link rel="stylesheet" href="style.css" >
<title >My Project</title >
</head >
<body >
<h1 >Welcome to My Project</h1 >
<p >I am the Project Manager.</p >
<button id="actionButton" >Click Me</button >
<hr >
<h2 >Book an Appointment</h2 >
<form id="bookingForm" >
<label >Name:</label ><br >
<input type="text" placeholder="Your Name" required ><br ><br >
<label >Email:</label ><br >
<input type="email" placeholder="you@example.com" required ><br ><br >
<label >Phone:</label ><br >
<input type="tel" placeholder="123-456-7890" ><br ><br >
<button type="submit" >Request Appointment</button >
</form >
<div id="chatWidget" >
<div id="chatPopup" class="hidden" >
<div class="chat-header" >AI Assistant</div >
<div class="chat-body" >How can I help you?</div >
</div >
<button id="chatToggle" >Chat</button >
</div >
<script src="script.js" ></script >
</body >
</html >
